name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write   # needed for PyPI trusted publishing

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            exe_suffix: ""
          - os: macos-latest
            target: darwin-amd64
            exe_suffix: ""
          - os: macos-14
            target: darwin-arm64
            exe_suffix: ""
          - os: windows-latest
            target: windows-amd64
            exe_suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version and build date
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          sed -i.bak "s/^__version__ = .*/__version__ = \"${TAG}\"/" pipeaudit/version.py
          sed -i.bak "s/^__build_date__ = .*/__build_date__ = \"${DATE}\"/" pipeaudit/version.py
          cat pipeaudit/version.py
        shell: bash

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name pipeaudit-${{ matrix.target }} \
            --collect-all pipeaudit \
            pipeaudit/__main__.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeaudit-${{ matrix.target }}
          path: dist/pipeaudit-${{ matrix.target }}${{ matrix.exe_suffix }}

  pypi-publish:
    runs-on: ubuntu-latest

    # Restrict to tagged releases only
    environment:
      name: pypi
      url: https://pypi.org/p/pipeaudit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Stamp version and build date
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          sed -i "s/^__version__ = .*/__version__ = \"${TAG}\"/" pipeaudit/version.py
          sed -i "s/^__build_date__ = .*/__build_date__ = \"${DATE}\"/" pipeaudit/version.py
          cat pipeaudit/version.py

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Collect binaries from artifact directories
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done

          # Include install script
          cp install.sh release/

          # Generate checksums
          cd release
          sha256sum * > checksums-sha256.txt
          echo "=== Release assets ==="
          ls -lh
          echo ""
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **One-line install (Linux / macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/accuknox/gh-audit/main/install.sh | sh
            ```

            **Or download a binary directly** from the assets below.

            **Or install via pip:**
            ```bash
            pip install pipeaudit
            ```

            See [README](https://github.com/accuknox/gh-audit#readme) for setup instructions.
          files: |
            release/*
