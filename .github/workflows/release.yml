name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            exe_suffix: ""
          - os: macos-latest
            target: darwin-amd64
            exe_suffix: ""
          - os: macos-14
            target: darwin-arm64
            exe_suffix: ""
          - os: windows-latest
            target: windows-amd64
            exe_suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name gh-auditor-${{ matrix.target }} \
            --collect-all gh_auditor \
            gh_auditor/__main__.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-auditor-${{ matrix.target }}
          path: dist/gh-auditor-${{ matrix.target }}${{ matrix.exe_suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Collect binaries from artifact directories
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done

          # Include install script
          cp install.sh release/

          # Generate checksums
          cd release
          sha256sum * > checksums-sha256.txt
          echo "=== Release assets ==="
          ls -lh
          echo ""
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **One-line install (Linux / macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/nyrahul/gh-audit/main/install.sh | sh
            ```

            **Or download a binary directly** from the assets below.

            **Or install from PyPI / source:**
            ```bash
            pip install gh-auditor
            ```

            See [README](https://github.com/nyrahul/gh-audit#readme) for setup instructions.
          files: |
            release/*
